<!DOCTYPE html>

<html>
<head>
  <title>Students Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container my-4">

  <h3 class="mb-4">Students Details</h3>

<a href="{{ url_for('back') }}" class="btn btn-secondary mb-3">Back</a>

  <div class="card shadow-sm p-3">

<table class="table table-hover table-bordered align-middle">

  <thead class="table-dark">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Rollno</th>
      <th>Class</th>
      <th>Phone</th>
      <th>Created At</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>

  <tbody>

    {% for s in students %}
    <tr>

      <form method="POST" action="/students/{{ s[0] }}">

        <td>{{ s[0] }}</td>

        <td>
          <input type="text" name="name" value="{{ s[1] }}" class="form-control">
        </td>

        <td>
          <input type="text" name="rollno" value="{{ s[2] }}" class="form-control">
        </td>

        <td>
          <input type="text" name="student_class" value="{{ s[3] }}" class="form-control">
        </td>

        <td>
          <input type="text" name="phoneno" value="{{ s[5] }}" class="form-control">
        </td>

        <td>{{ s[6] }}</td>

        <td>
          {% if s[7] == 1 %}
            <span class="badge bg-success">Approved</span>
          {% else %}
            <span class="badge bg-warning">Pending</span>
          {% endif %}
        </td>

        <td>

          <button class="btn btn-success btn-sm">
            Update
          </button><br>

          <a href="/delete_student/{{ s[0] }}"
             class="btn btn-danger btn-sm"
             onclick="return confirm('Delete this student?')">
             Delete
          </a><br>

          {% if s[7] == 0 %}
          <a href="/approve_student/{{ s[0] }}"
             class="btn btn-primary btn-sm">
             Approve
          </a>
          {% endif %}

        </td>

      </form>

    </tr>
    {% endfor %}

  </tbody>

</table>
  </div>

</div>

</body>
</html>
