<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login - Digital Attendance</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: url("{{ url_for('static', filename='images/image.jpg') }}") center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .nav-gradient {
      background: linear-gradient(90deg,#0f172a,#3b82f6);
      border-radius: 0.75rem 0.75rem 0 0;
    }
  </style>
</head>
<body>

<div class="card glass-card p-0" style="width: 400px;">
    
    <div class="nav-gradient text-white text-center py-3">
      <h5 class="mb-0">Admin Login</h5>
    </div>

    <div class="p-4">

      <!-- ERROR MESSAGE -->
      {% if error %}
      <div class="alert alert-danger alert-dismissible fade show" role="alert">
        {{ error }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
      {% endif %}

      <form method="POST">

        <div class="mb-3">
          <label class="form-label">EmailID</label>
          <input type="text" name="EmailID" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" name="password" id="password" class="form-control" required>
            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="d-grid mb-2">
          <button type="submit" class="btn btn-primary">
            Login
          </button>
        </div>

      </form>

      <div class="text-center">
        <a href="{{ url_for('reset_password') }}" class="text-decoration-none small">
          Forgot Password?
        </a>
      </div>

      <div class="text-center mt-2">
        <a href="{{ url_for('home') }}" class="text-decoration-none small">
          ← Back to Dashboard
        </a>
      </div>

    </div>
</div>

<script>
function togglePassword() {
  const password = document.getElementById("password");
  password.type = password.type === "password" ? "text" : "password";
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
